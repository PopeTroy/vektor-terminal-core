name: Vektor Kinetic Auditor
on:
  repository_dispatch:
    types: [vektor_audit_trigger]

jobs:
  kinetic-process:
    runs-on: ubuntu-latest
    steps:
      - name: Syncing Super Circuit
        uses: actions/checkout@v3

      - name: Loading Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Executing PRCE Surface Audit
        # Accesses the 'avg_g' sent by the WordPress HUD
        run: python vektor-logic.py ${{ github.event.client_payload.avg_g }}

      - name: Committing Scientific Proof
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [PRCE]"
          git add vektor-manifest.json
          git commit -m "PopeTroy: [KINETIC AUDIT] Surface Verification Locked"
          git push
