name: Vektor Kinetic Auditor
on:
  repository_dispatch:
    types: [vektor_audit_trigger]

jobs:
  kinetic-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Syncing Super Circuit
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Loading Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Executing PRCE Surface Audit
        run: python vektor-logic.py ${{ github.event.client_payload.avg_g }}

      - name: Force Update Manifest
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [PRCE]"
          # Create the file if it somehow doesn't exist
          touch vektor-manifest.json
          git add vektor-manifest.json
          git commit -m "PopeTroy: [KINETIC AUDIT] $(date)" || echo "No changes to commit"
          git push origin main
