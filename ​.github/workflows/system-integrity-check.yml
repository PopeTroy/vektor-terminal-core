name: Vektor Kinetic Auditor
on:
  repository_dispatch:
    types: [vektor_audit_trigger]

jobs:
  kinetic-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Force explicit write access
    steps:
      - name: Syncing Super Circuit
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Use internal token for higher priority

      - name: Loading Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Executing PRCE Surface Audit
        run: python vektor-logic.py ${{ github.event.client_payload.avg_g }}

      - name: Committing Scientific Proof
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [PRCE]"
          git add vektor-manifest.json
          # Force the commit with a unique timestamp to ensure the hash changes
          git commit -m "PopeTroy: [KINETIC AUDIT] $(date +'%H:%M:%S')" || exit 0
          git push origin main
